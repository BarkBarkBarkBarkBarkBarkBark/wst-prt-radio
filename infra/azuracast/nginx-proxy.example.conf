# Nginx reverse proxy example for AzuraCast
# Place at /etc/nginx/sites-available/azuracast

server {
    listen 80;
    server_name azura-admin.wstprtradio.com radio.wstprtradio.com;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name azura-admin.wstprtradio.com;

    ssl_certificate /etc/letsencrypt/live/azura-admin.wstprtradio.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/azura-admin.wstprtradio.com/privkey.pem;

    location / {
        proxy_pass http://localhost:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

server {
    listen 443 ssl http2;
    server_name radio.wstprtradio.com;

    ssl_certificate /etc/letsencrypt/live/radio.wstprtradio.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/radio.wstprtradio.com/privkey.pem;

    # Stream endpoint
    location /radio.mp3 {
        proxy_pass http://localhost:8000/radio.mp3;
        proxy_set_header Host $host;
        proxy_buffering off;
        proxy_cache off;
        add_header Access-Control-Allow-Origin *;
    }

    # API endpoint
    location /api {
        proxy_pass http://localhost:8080/api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
